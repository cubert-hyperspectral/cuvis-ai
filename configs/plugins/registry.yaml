# Central Plugin Registry for cuvis-ai
#
# This registry contains community-contributed and official plugins.
# Users can reference this file to load all registered plugins:
#   uv run restore-pipeline --plugins-path configs/plugins/registry.yaml
#
# Or create custom manifests to load specific plugins only.
#
# Contributing: See docs/development/contributing.md#plugin-contribution-workflow

plugins:
  # ============================================================================
  # Official Cubert Plugins
  # ============================================================================

  adaclip:
    # AdaCLIP-based anomaly detection with advanced band selection
    # path: "D:\\code-repos\\cuvis-ai-adaclip\\cuvis-ai-adaclip"
    repo: "https://github.com/cubert-hyperspectral/cuvis-ai-adaclip.git"
    tag: "v0.1.2"
    provides:
      - cuvis_ai_adaclip.node.adaclip_node.AdaCLIPDetector

  ultralytics:
    # Ultralytics YOLO26 nodes for cuvis.ai detection and tracking pipelines
    repo: "https://github.com/cubert-hyperspectral/cuvis-ai-ultralytics.git"
    tag: "v0.1.0"
    provides:
      - cuvis_ai_ultralytics.node.YOLOPreprocess
      - cuvis_ai_ultralytics.node.YOLO26Detection
      - cuvis_ai_ultralytics.node.YOLOPostprocess

  deepeiou:
    # DeepEIoU tracker and ReID feature extractors for cuvis.ai tracking pipelines
    repo: "https://github.com/cubert-hyperspectral/cuvis-ai-deepeiou.git"
    tag: "v0.1.0"
    provides:
      - cuvis_ai_deepeiou.node.DeepEIoUTrack
      - cuvis_ai_deepeiou.node.OSNetExtractor
      - cuvis_ai_deepeiou.node.ResNetExtractor

  trackeval:
    # TrackEval-based tracking metric nodes for HOTA, CLEAR, and Identity evaluation
    repo: "https://github.com/cubert-hyperspectral/cuvis-ai-trackeval.git"
    tag: "v0.1.0"
    provides:
      - cuvis_ai_trackeval.node.HOTAMetricNode
      - cuvis_ai_trackeval.node.CLEARMetricNode
      - cuvis_ai_trackeval.node.IdentityMetricNode

  # ============================================================================
  # Community Plugins
  # ============================================================================

  # Community-contributed plugins will be added here via pull requests.
  # See docs/development/contributing.md for submission guidelines.

  # Example plugin structure:
  # plugin_name:
  #   repo: "https://github.com/org/plugin-repo.git"
  #   tag: "v1.0.0"
  #   provides:
  #     - plugin_module.nodes.NodeClass
