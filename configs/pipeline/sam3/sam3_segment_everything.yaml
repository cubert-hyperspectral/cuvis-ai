metadata:
  name: SAM3_Segment_Everything
  description: SAM3 prompt-free segment-everything with CU3S false-RGB input
  tags:
    - tracking
    - sam3
    - segment-everything
    - false-rgb
    - video
  author: cuvis.ai

nodes:
  - name: cu3s_data
    class_name: cuvis_ai.node.data.CU3SDataNode
    hparams: {}

  - name: false_rgb
    class_name: cuvis_ai.node.channel_selector.CIETristimulusFalseRGBSelector
    hparams: {}

  - name: sam3_segment_everything
    class_name: cuvis_ai_sam3.node.SAM3SegmentEverything
    hparams: {}

  - name: tracking_coco_json
    class_name: cuvis_ai.node.json_file.CocoTrackMaskWriter
    hparams:
      output_json_path: outputs/tracking_results.json
      default_category_name: object

  - name: overlay
    class_name: cuvis_ai.node.anomaly_visualization.TrackingOverlayNode
    hparams:
      alpha: 0.2

  - name: to_video
    class_name: cuvis_ai.node.video.ToVideoNode
    hparams:
      output_video_path: outputs/tracking_overlay.mp4
      frame_rate: 10.0

connections:
  - source: cu3s_data.outputs.cube
    target: false_rgb.inputs.cube
  - source: cu3s_data.outputs.wavelengths
    target: false_rgb.inputs.wavelengths
  - source: false_rgb.outputs.rgb_image
    target: sam3_segment_everything.inputs.rgb_frame
  - source: cu3s_data.outputs.mesu_index
    target: sam3_segment_everything.inputs.frame_id
  - source: cu3s_data.outputs.mesu_index
    target: tracking_coco_json.inputs.frame_id
  - source: sam3_segment_everything.outputs.mask
    target: tracking_coco_json.inputs.mask
  - source: sam3_segment_everything.outputs.object_ids
    target: tracking_coco_json.inputs.object_ids
  - source: sam3_segment_everything.outputs.detection_scores
    target: tracking_coco_json.inputs.detection_scores
  - source: false_rgb.outputs.rgb_image
    target: overlay.inputs.rgb_image
  - source: cu3s_data.outputs.mesu_index
    target: overlay.inputs.frame_id
  - source: sam3_segment_everything.outputs.mask
    target: overlay.inputs.mask
  - source: sam3_segment_everything.outputs.object_ids
    target: overlay.inputs.object_ids
  - source: overlay.outputs.rgb_with_overlay
    target: to_video.inputs.rgb_image
  - source: cu3s_data.outputs.mesu_index
    target: to_video.inputs.frame_id
