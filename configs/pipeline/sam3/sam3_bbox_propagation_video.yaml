metadata:
  name: SAM3_Bbox_Propagation_Video
  description: SAM3 runtime-bbox propagation with RGB video frame source
  tags:
    - tracking
    - sam3
    - bbox-prompt
    - video
  author: cuvis.ai

nodes:
  - name: video_frame
    class_name: cuvis_ai.node.video.VideoFrameNode
    hparams: {}

  - name: sam3_tracker
    class_name: cuvis_ai_sam3.node.SAM3BboxPropagation
    hparams: {}

  - name: tracking_coco_json
    class_name: cuvis_ai.node.json_writer.CocoTrackMaskWriter
    hparams:
      output_json_path: outputs/tracking_results.json
      default_category_name: person

connections:
  - source: video_frame.outputs.rgb_image
    target: sam3_tracker.inputs.rgb_frame
  - source: video_frame.outputs.frame_id
    target: sam3_tracker.inputs.frame_id
  - source: video_frame.outputs.frame_id
    target: tracking_coco_json.inputs.frame_id
  - source: sam3_tracker.outputs.mask
    target: tracking_coco_json.inputs.mask
  - source: sam3_tracker.outputs.object_ids
    target: tracking_coco_json.inputs.object_ids
  - source: sam3_tracker.outputs.detection_scores
    target: tracking_coco_json.inputs.detection_scores
